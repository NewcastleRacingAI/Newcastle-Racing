services:
  sim:
    image: nrai:latest
    container_name: nrai
    environment:
      - DISPLAY=novnc:0.0
    networks:
      - x11
    ports:
      - "9090:9090"
    depends_on:
      - novnc
    stdin_open: true
    tty: true
# Uncomment the following lines and change to suit your system
    volumes:
      - /home/rowan/uni/racingAI/kalman-filter:/workspace/src/kalman-filter

  novnc:
    image: theasp/novnc:latest
    container_name: vnc_container
    environment:
      - DISPLAY_WIDTH=1600
      - DISPLAY_HEIGHT=968
      - RUN_XTERM=no
    ports:
      - "8080:8080"
    networks:
      - x11

networks:
  x11:
    driver: bridge
