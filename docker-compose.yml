version: "3.8"

services:
  sim:
    build: .
    image: galactic_custom
    container_name: nufs
    volumes: 
      - ./src:/workspace/src
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $HOME/.Xauthority:/root/.Xauthority:rw
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/root/.Xauthority
    devices:
      - /dev/dri:/dev/dri
    networks:
      - x11
    ports:
      - "9090:9090"
    stdin_open: true
    tty: true
    privileged: true


networks:
  x11:
    driver: bridge

