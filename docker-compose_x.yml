services:
  sim:
    build: .
    image: galactic_custom
    container_name: nufs
    volumes: 
      - ./src:/workspace
    environment:
      - DISPLAY=host.docker.internal:0.0
      - QT_X11_NO_MITSHM=1
    networks:
      - x11
    ports:
      - "9090:9090"
    stdin_open: true
    tty: true
    privileged: true

networks:
  x11:
    driver: bridge

